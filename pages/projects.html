<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav class="sidebar">
        <h1>zenze's website</h1>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
        <p class="sidebar-updated">Last updated: 21 March 2026</p>
    </nav>

    <main class="content">
        <h2>Projects</h2>
        <hr>

        <div class="projects-container">
            <div class="project-viewer" id="viewer">
                <p class="empty-state">Select a project to view details.</p>
            </div>
            <div class="project-list">
                <table>
                    <tr>
                        <th style="font-weight: bold;">Projects</th>
                    </tr>
                </table>
                <table id="projectTable">
                    <tr class="project-row" data-project="1">
                        <td>Markov Janken</td>
                    </tr>
                    <tr class="project-row" data-project="2">
                        <td>Bad Apple PSP</td>
                    </tr>
                    <tr class="project-row" data-project="3">
                        <td>zecache</td>
                    </tr>
                    <tr class="project-row" data-project="4">
                        <td>Hidato Solver</td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="footer">
            <p><a href="../index.html">Back to Home</a></p>
        </div>
    </main>

    <script>
        const projects = {
            1: {
                title: "Markov Janken",
                description: "Markov janken is just rock paper scissor but the bot learns from your moves and tries to predict you. It has a AI that uses a simple Markov Chain to predict a player’s next move in a game (like Rock-Paper-Scissors) based on their last two moves. It looks for patterns in what the player typically does after specific move pairs, predicts the most likely next move, and plays the counter. If no pattern is found, it chooses randomly. Over time, it can adapt to patterns in human behavior, but it won’t achieve a perfect win rate because players can change their strategy once they notice it.",
                images: ["images/markov-janken.png"],
                github: "https://github.com/zenzesama/markov-janken-pygame"
            },
            2: {
                title: "Bad Apple PSP",
                description: "This project runs the Bad Apple!! video on a PSP. It's basically a fun experiment in squeezing video playback out of really limited hardware, converting frames and rendering them efficiently so the animation actually works on the device. Everything needed to run it is included in the repo. It is less about practicality and more about seeing how far you can push the PSP.",
                images: ["images/bad-apple-psp.png"],
                github: "https://github.com/zenzesama/bad-apple-psp"
            },
            3: {
                title: "zecache",
                description: "zecache is a small header-only C++ utility that makes recursive functions way faster by automatically caching their results. Instead of rewriting your logic for memoization, you just wrap your recursion in a lambda and let it handle the rest. It works with any number of arguments and even has an optional LRU mode if you want to limit memory usage. It’s mainly a clean way to keep recursive code simple without paying the usual performance cost.",
                images: ["images/zecache.png"],
                github: "https://github.com/zenzesama/zecache"
            },
            4: {
                title: "Hidato Solver",
                description: "Hidato Solver is a C++ and FLTK-based program for solving Hidato logic puzzles, where consecutive numbers must connect across a grid. It features an interactive editor with visual cues, keyboard and mouse controls, and a backtracking solver that fills in numbers automatically. The program supports grids up to 20x20 and allows blocked cells for irregular puzzles. It's designed as an educational project to showcase GUI programming, backtracking algorithms, and modern C++ features.",
                images: ["images/hidato-solver.png"],
                github: "https://github.com/zenzesama/hidatoSolver"
            }
        };

        const rows = document.querySelectorAll('.project-row');
        const viewer = document.getElementById('viewer');

        rows.forEach(row => {
            row.addEventListener('click', () => {
                rows.forEach(r => r.classList.remove('active'));
                row.classList.add('active');

                const id = row.dataset.project;
                const project = projects[id];

                const imagesHtml = project.images.map((img, i) => 
                    `<img src="${img}" alt="${project.title} - ${i + 1}">`
                ).join('');

                viewer.innerHTML = `
                    <div class="project-content">
                        <h2 class="project-title">${project.title}</h2>
                        <div class="image-slider">
                            ${imagesHtml}
                        </div>
                        <div class="slider-controls">
                            <button class="slider-btn" onclick="document.querySelector('.image-slider').scrollBy({left: -520, behavior: 'smooth'})">← Prev</button>
                            <button class="slider-btn" onclick="document.querySelector('.image-slider').scrollBy({left: 520, behavior: 'smooth'})">Next →</button>
                        </div>
                        <p class="project-description">${project.description}</p>
                        <a href="${project.github}" target="_blank" class="github-link">View on GitHub</a>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
